<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VYBRO RADIO</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 30px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🎵 VYBRO RADIO</h1>
  <p>Playlist oficial da VYBRO Streetwear</p>

  <p id="track">Now Playing: Loading...</p>

  <!-- PLAYER -->
  <audio id="player" controls></audio>

  <br><br>

  <!-- CONTROLES -->
  <button onclick="prevSong()">⏮ Prev</button>
  <button onclick="playSong()">▶ Play</button>
  <button onclick="pauseSong()">⏸ Pause</button>
  <button onclick="nextSong()">⏭ Next</button>

  <script>
    const songs = [
      {
        name: "Never Scared",
        url: "https://c4rr4r496-lang.github.io/vybro-radio/01-never-scared.mp3"
      },
      {
        name: "A Bar Song (Tipsy)",
        url: "https://c4rr4r496-lang.github.io/vybro-radio/02-a-bar-song-tipsy.mp3"
      },
      {
        name: "Flowers",
        url: "https://c4rr4r496-lang.github.io/vybro-radio/03-flowers.mp3"
      },
      {
        name: "Focus",
        url: "https://c4rr4r496-lang.github.io/vybro-radio/04-focus.mp3"
      },
      {
        name: "Industry Baby",
        url: "https://c4rr4r496-lang.github.io/vybro-radio/06-industry-baby.mp3"
      },
      {
        name: "B.O.B",
        url: "https://c4rr4r496-lang.github.io/vybro-radio/09-bob.mp3"
      },
      {
        name: "Swag Surfin",
        url: "https://c4rr4r496-lang.github.io/vybro-radio/13-swag-surfin.mp3"
      }
    ];

    let current = 0;

    const player = document.getElementById("player");
    const track = document.getElementById("track");

    function loadSong(index) {
      player.src = songs[index].url;
      track.textContent = "Now Playing: " + songs[index].name;
    }

    function playSong() {
      player.play();
    }

    function pauseSong() {
      player.pause();
    }

    function nextSong() {
      current = (current + 1) % songs.length;
      loadSong(current);
      player.play();
    }

    function prevSong() {
      current = (current - 1 + songs.length) % songs.length;
      loadSong(current);
      player.play();
    }

    // iniciar
    loadSong(current);
  </script>

</body>
</html>
