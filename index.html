<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VYBRO RADIO</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:Arial;">

  <h1>🎵 VYBRO RADIO</h1>
  <p>Playlist oficial da VYBRO Streetwear</p>

  <p id="track">Now Playing: Never Scared</p>

  <!-- PLAYER -->
  <audio id="player" controls>
    <source src="01-never-scared.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio HTML5.
  </audio>

  <br><br>

  <!-- CONTROLES -->
  <button onclick="document.getElementById('player').play()">▶ Play</button>
  <button onclick="document.getElementById('player').pause()">⏸ Pause</button>

  <script>
    const player = document.getElementById("player");
    const track = document.getElementById("track");

    player.addEventListener("play", () => {
      track.textContent = "Now Playing: Never Scared";
    });

    player.addEventListener("pause", () => {
      track.textContent = "Paused";
    });
  </script>

</body>
</html>
